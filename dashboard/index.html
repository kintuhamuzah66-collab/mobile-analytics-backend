<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Mobile Analytics Dashboard</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="container">

        <!-- HEADER -->

        <div class="header">

            <div>

                <h1>
                    Mobile Analytics Dashboard
                </h1>

                <p>
                    Real-Time Phone Activity Monitoring
                </p>

            </div>

            <div class="header-right">

                <div id="liveClock" class="clock"></div>

                <div id="status" class="status offline">
                    Offline
                </div>

            </div>

        </div>


        <!-- STATS -->

        <div class="cards">

            <div class="card glow-blue">

                <h2>Total Events</h2>

                <p id="totalEvents">0</p>

            </div>

            <div class="card glow-green">

                <h2>Active Users</h2>

                <p id="activeUsers">0</p>

            </div>

            <div class="card glow-purple">

                <h2>Top App</h2>

                <p id="topApp">---</p>

            </div>

        </div>


        <!-- CHART + ACTIVE USERS -->

        <div class="grid-two">

            <div class="table-container">

                <h2>Top Applications</h2>

                <canvas id="appsChart"></canvas>

            </div>


            <div class="table-container">

                <h2>Currently Active Users</h2>

                <ul id="activeUsersList"></ul>

            </div>

        </div>


        <!-- LIVE EVENTS -->

        <div class="table-container">

            <div class="table-header">

                <h2>Live Phone Events</h2>

                <span class="live-dot"></span>

            </div>

            <table>

                <thead>

                    <tr>

                        <th>User</th>
                        <th>Application</th>
                        <th>Event</th>
                        <th>Duration</th>
                        <th>Time</th>

                    </tr>

                </thead>

                <tbody id="eventsTableBody">

                </tbody>

            </table>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
